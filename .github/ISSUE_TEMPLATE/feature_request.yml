name: Feature request
description: Propose a scoped improvement to StudioOps.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: story
    attributes:
      label: User story
      description: State who needs the capability, what they need, and why.
      placeholder: As a project owner, I want ..., so that ...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the current limitation without prescribing an implementation.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Expected outcome
      description: What should be observably different when the work is complete?
    validations:
      required: true
  - type: textarea
    id: criteria
    attributes:
      label: Acceptance criteria
      description: List testable conditions for completion.
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Security, privacy, and release considerations
      description: Note effects on credentials, PII, worker permissions, protected branches, QA, releases, or production.
  - type: textarea
    id: visuals
    attributes:
      label: Visual references
      description: Attach mockups or screenshots for UI work after removing private data.
