<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#131322"/>
      <stop offset="1" stop-color="#24174a"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9b6cff"/>
      <stop offset="1" stop-color="#30d9ff"/>
    </linearGradient>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#070711" flood-opacity="0.5"/></filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg2)"/>
  <circle cx="1070" cy="110" r="250" fill="#2edcff" opacity="0.055"/>

  <text x="60" y="72" fill="#a8a1bd" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1.8">STUDIOOPS · PROJECT STANDARDS</text>
  <text x="60" y="124" fill="#ffffff" font-family="Arial, sans-serif" font-size="42" font-weight="800">Every agent reads the same engineering contract.</text>
  <text x="60" y="160" fill="#bcb6cf" font-family="Arial, sans-serif" font-size="19">Standards are attached to the project, injected into builder and reviewer prompts, and enforced before release.</text>

  <g transform="translate(60 205)" font-family="Arial, sans-serif" filter="url(#s2)">
    <rect width="410" height="440" rx="24" fill="#191928" stroke="#3a3650"/>
    <text x="28" y="41" fill="#ffffff" font-size="20" font-weight="800">17 standards loaded</text>
    <text x="28" y="68" fill="#8f88a7" font-size="14">Virginia Beach Winery Redesign</text>
    <g transform="translate(28 92)" font-size="15">
      <rect width="354" height="42" rx="11" fill="#242238"/><circle cx="22" cy="21" r="7" fill="#6de5a5"/><text x="42" y="27" fill="#d8d3e3">engineering.md</text>
      <rect y="50" width="354" height="42" rx="11" fill="#242238"/><circle cx="22" cy="71" r="7" fill="#6de5a5"/><text x="42" y="77" fill="#d8d3e3">security-privacy.md</text>
      <rect y="100" width="354" height="42" rx="11" fill="#242238"/><circle cx="22" cy="121" r="7" fill="#6de5a5"/><text x="42" y="127" fill="#d8d3e3">accessibility.md</text>
      <rect y="150" width="354" height="42" rx="11" fill="#242238"/><circle cx="22" cy="171" r="7" fill="#6de5a5"/><text x="42" y="177" fill="#d8d3e3">performance.md</text>
      <rect y="200" width="354" height="42" rx="11" fill="#242238"/><circle cx="22" cy="221" r="7" fill="#6de5a5"/><text x="42" y="227" fill="#d8d3e3">testing.md</text>
      <rect y="250" width="354" height="42" rx="11" fill="#242238"/><circle cx="22" cy="271" r="7" fill="#6de5a5"/><text x="42" y="277" fill="#d8d3e3">release-deployment.md</text>
      <rect y="300" width="354" height="42" rx="11" fill="#1e1c31" stroke="#443d64"/><text x="177" y="327" fill="#aca4bf" text-anchor="middle" font-weight="700">+ 11 more project rules</text>
    </g>
  </g>

  <g stroke="url(#line)" stroke-width="3" fill="none">
    <path d="M486 352 C540 352 540 305 586 305"/>
    <path d="M486 425 C540 425 540 425 586 425"/>
    <path d="M486 500 C540 500 540 545 586 545"/>
  </g>

  <g transform="translate(585 232)" font-family="Arial, sans-serif" filter="url(#s2)">
