<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151327"/>
      <stop offset="0.58" stop-color="#21183f"/>
      <stop offset="1" stop-color="#112737"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9b6cff"/>
      <stop offset="1" stop-color="#2edcff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#716b92"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#080713" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1120" cy="-20" r="260" fill="#8f63ff" opacity="0.08"/>
  <circle cx="120" cy="735" r="280" fill="#26d9ff" opacity="0.05"/>

  <g transform="translate(58 42)">
    <path d="M11 21 L26 5 L41 21 L26 37 Z" fill="none" stroke="url(#accent)" stroke-width="5"/>
    <circle cx="26" cy="21" r="4" fill="#f7f4ff"/>
    <text x="56" y="29" fill="#f8f6ff" font-family="Arial, sans-serif" font-size="25" font-weight="700">StudioOps</text>
    <rect x="1000" y="2" width="164" height="36" rx="18" fill="#1b322d" stroke="#417768"/>
    <circle cx="1023" cy="20" r="5" fill="#64e6a2"/>
    <text x="1037" y="25" fill="#9af2c1" font-family="Arial, sans-serif" font-size="13" font-weight="700">COMMUNITY · LOCAL</text>
  </g>

  <text x="58" y="123" fill="#ffffff" font-family="Arial, sans-serif" font-size="42" font-weight="800">From request to production—without AI slop.</text>
  <text x="58" y="158" fill="#b8b3cb" font-family="Arial, sans-serif" font-size="20">A senior AI engineering workflow with standards, staged review, QA evidence, and a human release gate.</text>

  <g stroke="#716b92" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <line x1="269" y1="345" x2="292" y2="345"/>
    <line x1="507" y1="345" x2="530" y2="345"/>
    <line x1="745" y1="345" x2="768" y2="345"/>
    <line x1="983" y1="345" x2="1006" y2="345"/>
  </g>

  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <g transform="translate(58 205)">
      <rect width="211" height="280" rx="22" fill="#1b1b2d" stroke="#3a3650"/>
      <rect x="20" y="20" width="50" height="50" rx="14" fill="#34265c"/>
      <text x="45" y="54" fill="#ba9cff" font-size="26" text-anchor="middle" font-weight="800">01</text>
      <text x="20" y="101" fill="#9d96b6" font-size="12" font-weight="700" letter-spacing="1.4">STRUCTURED INTAKE</text>
