      <text x="20" y="220" fill="#c2bed2" font-size="15">Scope + risk</text>
      <rect x="20" y="244" width="99" height="25" rx="12" fill="#28233f"/>
      <text x="69" y="261" fill="#c8b7ff" font-size="12" text-anchor="middle" font-weight="700">READY</text>
    </g>

    <g transform="translate(296 205)">
      <rect width="211" height="280" rx="22" fill="#1b1b2d" stroke="#3a3650"/>
      <rect x="20" y="20" width="50" height="50" rx="14" fill="#233854"/>
      <text x="45" y="54" fill="#66dcff" font-size="26" text-anchor="middle" font-weight="800">02</text>
      <text x="20" y="101" fill="#9d96b6" font-size="12" font-weight="700" letter-spacing="1.4">AI BUILDERS</text>
      <text x="20" y="135" fill="#ffffff" font-size="22" font-weight="800">Build + validate</text>
      <text x="20" y="170" fill="#c2bed2" font-size="15">Read standards</text>
      <text x="20" y="195" fill="#c2bed2" font-size="15">Run project checks</text>
      <text x="20" y="220" fill="#c2bed2" font-size="15">Open linked PR</text>
      <rect x="20" y="244" width="139" height="25" rx="12" fill="#17343b"/>
      <circle cx="36" cy="256.5" r="4" fill="#4de3c1"/>
      <text x="48" y="261" fill="#85f2dc" font-size="12" font-weight="700">2 RUNNING</text>
    </g>

    <g transform="translate(534 205)">
      <rect width="211" height="280" rx="22" fill="#201c33" stroke="#7251bf" stroke-width="2"/>
      <rect x="20" y="20" width="50" height="50" rx="14" fill="#3d2857"/>
      <text x="45" y="54" fill="#ff8aa5" font-size="26" text-anchor="middle" font-weight="800">03</text>
      <text x="20" y="101" fill="#b7a8df" font-size="12" font-weight="700" letter-spacing="1.4">SPECIALIST REVIEW</text>
      <text x="20" y="135" fill="#ffffff" font-size="22" font-weight="800">Challenge the PR</text>
      <text x="20" y="171" fill="#86e8b1" font-size="14" font-weight="700">✓ Backend approved</text>
      <text x="20" y="197" fill="#ff91a9" font-size="14" font-weight="700">↻ Frontend rejected</text>
      <text x="20" y="223" fill="#c2bed2" font-size="14">Accessibility queued</text>
      <rect x="20" y="244" width="169" height="25" rx="12" fill="#462338"/>
      <text x="104" y="261" fill="#ff9eb3" font-size="12" text-anchor="middle" font-weight="700">CHANGES REQUESTED</text>
    </g>

    <g transform="translate(772 205)">
      <rect width="211" height="280" rx="22" fill="#1b1b2d" stroke="#3a3650"/>
      <rect x="20" y="20" width="50" height="50" rx="14" fill="#263854"/>
      <text x="45" y="54" fill="#6bdcff" font-size="26" text-anchor="middle" font-weight="800">04</text>
      <text x="20" y="101" fill="#9d96b6" font-size="12" font-weight="700" letter-spacing="1.4">QA INTEGRATION</text>
      <text x="20" y="135" fill="#ffffff" font-size="22" font-weight="800">Prove it works</text>
      <text x="20" y="170" fill="#c2bed2" font-size="15">Preview branch</text>
      <text x="20" y="195" fill="#c2bed2" font-size="15">Screenshots + a11y</text>
      <text x="20" y="220" fill="#c2bed2" font-size="15">Tests + evidence</text>
      <rect x="20" y="244" width="109" height="25" rx="12" fill="#2b2e43"/>
      <text x="74" y="261" fill="#c8c5d7" font-size="12" text-anchor="middle" font-weight="700">WAITING</text>
    </g>

    <g transform="translate(1010 205)">
      <rect width="211" height="280" rx="22" fill="#1b1b2d" stroke="#3a3650"/>
      <rect x="20" y="20" width="50" height="50" rx="14" fill="#253e37"/>
      <text x="45" y="54" fill="#75e6aa" font-size="26" text-anchor="middle" font-weight="800">05</text>
      <text x="20" y="101" fill="#9d96b6" font-size="12" font-weight="700" letter-spacing="1.4">HUMAN RELEASE GATE</text>
      <text x="20" y="135" fill="#ffffff" font-size="22" font-weight="800">You ship it</text>
      <text x="20" y="170" fill="#c2bed2" font-size="15">Review evidence</text>
      <text x="20" y="195" fill="#c2bed2" font-size="15">Approve or reject</text>
      <text x="20" y="220" fill="#c2bed2" font-size="15">Merge + deploy</text>
      <rect x="20" y="244" width="143" height="25" rx="12" fill="#1b392f"/>
      <text x="91" y="261" fill="#8aebbb" font-size="12" text-anchor="middle" font-weight="700">NO AUTO-DEPLOY</text>
