      <rect x="208" width="190" height="45" rx="13" fill="#252139"/><text x="303" y="28" fill="#d6cdf0" text-anchor="middle">Accessibility</text>
      <rect x="416" width="190" height="45" rx="13" fill="#252139"/><text x="511" y="28" fill="#d6cdf0" text-anchor="middle">Performance</text>
      <rect x="624" width="190" height="45" rx="13" fill="#252139"/><text x="719" y="28" fill="#d6cdf0" text-anchor="middle">Testing</text>
      <rect x="832" width="283" height="45" rx="13" fill="#252139"/><text x="973.5" y="28" fill="#d6cdf0" text-anchor="middle">Release + deployment safety</text>
    </g>
