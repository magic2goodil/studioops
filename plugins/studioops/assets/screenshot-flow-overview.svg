  <g transform="translate(58 535)" font-family="Arial, sans-serif">
    <rect width="1163" height="126" rx="22" fill="#151624" stroke="#3a3650"/>
    <text x="24" y="34" fill="#9d96b6" font-size="12" font-weight="700" letter-spacing="1.4">ONE ENGINEERING CONTRACT · EVERY AGENT · EVERY REVIEW</text>
