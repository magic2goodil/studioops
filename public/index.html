<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Codex Mission Control</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Local-first AI work orchestration</p>
        <h1>Codex Mission Control</h1>
      </div>
      <div class="topbar-actions">
        <button id="automationButton" type="button">Run Automation Tick</button>
        <button id="refreshButton" type="button">Refresh</button>
        <a href="https://github.com/magic2goodil/codex-mission-control" target="_blank" rel="noreferrer">GitHub</a>
      </div>
    </header>

    <main id="appLayout" class="layout">
      <section class="panel project-panel">
        <div class="panel-header">
          <h2>Projects</h2>
          <span id="projectCount">0</span>
        </div>
        <div id="projectList" class="project-list"></div>
        <div id="projectSettings" class="project-settings"></div>
        <div id="qaReviewPanel" class="qa-review-panel"></div>
        <form id="projectForm" class="stacked-form">
          <h3>Add Project</h3>
          <label>Key <input name="key" placeholder="myapp" required></label>
          <label>Name <input name="name" placeholder="My App" required></label>
          <label>Repo Path <input name="repoPath" placeholder="/absolute/path/to/repo"></label>
          <label>GitHub Repo URL <input name="repoUrl" placeholder="https://github.com/owner/repo"></label>
          <label class="checkbox-row"><input name="trustLeadApprovals" type="checkbox"> Trust lead approvals</label>
          <label>QA Integration Branch <input name="integrationBranch" placeholder="qa/myapp"></label>
          <label>Standards <textarea name="standards" rows="3" placeholder="standards/frontend.md&#10;standards/styles.md&#10;standards/performance.md"></textarea></label>
          <label>Validation <input name="validationCommands" placeholder="npm run check"></label>
          <button type="submit">Add Project</button>
        </form>
      </section>

      <section class="panel board-panel">
        <div class="panel-header">
          <div>
            <h2>Tasks</h2>
            <p id="configStatus">Checking config...</p>
          </div>
          <select id="statusFilter" aria-label="Status filter">
            <option value="">All statuses</option>
            <option value="idea">Idea</option>
            <option value="ready">Ready</option>
            <option value="queued">Queued</option>
            <option value="in_progress">In progress</option>
            <option value="blocked">Blocked</option>
            <option value="builder_review">Builder review</option>
            <option value="backend_review">Backend review</option>
            <option value="frontend_review">Frontend review</option>
            <option value="lead_review">Lead review</option>
            <option value="qa_review">QA review</option>
            <option value="needs_changes">Needs changes</option>
            <option value="user_review">User review</option>
            <option value="approved">Approved</option>
            <option value="merged">Merged</option>
            <option value="deployed">Deployed</option>
            <option value="done">Done</option>
            <option value="closed">Closed</option>
          </select>
        </div>
        <div id="taskBoard" class="task-board"></div>
      </section>

      <aside class="panel detail-panel">
        <div class="panel-header">
          <h2>Task Detail</h2>
        </div>
        <div id="taskDetail" class="task-detail">
          <p>Select a task to view prompts and review metadata.</p>
        </div>
        <form id="taskForm" class="stacked-form">
          <h3>Add Task</h3>
          <label>Project <select name="project" required></select></label>
          <label>Title <input name="title" placeholder="Build the thing" required></label>
          <label>Description <textarea name="description" rows="4" placeholder="What should happen?"></textarea></label>
          <label>Type
            <select name="type">
              <option value="feature">Feature</option>
              <option value="epic">Epic</option>
              <option value="component">Component</option>
              <option value="content-model">Content Model</option>
              <option value="information-architecture">Information Architecture</option>
              <option value="mockup-critique">Mockup Critique</option>
              <option value="design">Design</option>
              <option value="frontend">Frontend</option>
              <option value="backend">Backend</option>
              <option value="review">Review</option>
            </select>
          </label>
          <label>Parent Epic/Task <input name="parentTaskId" placeholder="task_12"></label>
          <label>Depends On <textarea name="dependsOnTaskIds" rows="2" placeholder="task_1, task_2"></textarea></label>
          <label>User Story <textarea name="userStory" rows="2" placeholder="As a customer, I want..."></textarea></label>
          <label>Expected Outcome <textarea name="expectedOutcome" rows="3" placeholder="What should be true when this is complete?"></textarea></label>
          <label>Visual Attachments <textarea name="attachments" rows="3" placeholder="One image path, screenshot, mockup URL, or reference per line"></textarea></label>
          <label>Status
            <select name="status">
              <option value="idea">Idea</option>
              <option value="ready">Ready</option>
              <option value="queued">Queued</option>
            </select>
          </label>
          <label>Acceptance Criteria <textarea name="acceptanceCriteria" rows="3" placeholder="One per line"></textarea></label>
          <button type="submit">Add Task</button>
        </form>
      </aside>
    </main>

    <template id="taskTemplate">
      <article class="task-card">
        <div class="task-card-top">
          <span class="status"></span>
          <span class="priority"></span>
        </div>
        <h3></h3>
        <p></p>
        <small></small>
      </article>
    </template>

    <div id="imageModal" class="image-modal" hidden>
      <div class="image-modal-backdrop" data-close-image-modal></div>
      <figure class="image-modal-content">
        <button class="image-modal-close" type="button" data-close-image-modal>Close</button>
        <img id="imageModalImage" alt="">
        <figcaption id="imageModalCaption"></figcaption>
      </figure>
    </div>

    <div id="taskModal" class="task-modal" hidden>
      <div class="task-modal-backdrop" data-close-task-modal></div>
      <section class="task-modal-content" aria-modal="true" role="dialog" aria-labelledby="taskModalTitle">
        <div class="task-modal-actions">
          <a id="taskModalOpenLink" href="/">Open full page</a>
          <button class="task-modal-close" type="button" data-close-task-modal>Close</button>
        </div>
        <div id="taskModalBody"></div>
      </section>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
